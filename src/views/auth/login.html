<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - FitCore</title>
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-container">

    <div class="login-left">

        <div class="overlay"></div>

        <div class="left-content">
            <h1>FIT<span>CORE</span></h1>

            <h2>
                BEM-VINDO<br>
                DE VOLTA
            </h2>

            <p>
                Acesse seus treinos e controle
                sua evolução diariamente.
            </p>
        </div>

    </div>

    <div class="login-right">

        <div class="login-card">

            <h2>ENTRAR</h2>

            <form id="loginForm">

                <input type="email" id="email" placeholder="E-mail" required>

                <input type="password" id="password" placeholder="Senha" required>

                <button type="submit">
                    ENTRAR
                </button>

            </form>

            <p class="register-link">
                Não possui conta?
                <a href="/cadastro">Cadastre-se</a>
            </p>

        </div>

    </div>

</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('password').value;
        
        if (!email || !senha) {
            alert('Por favor, preencha todos os campos.');
            return;
        }

        const btn = document.querySelector('button[type="submit"]');
        const originalText = btn.textContent;
        btn.textContent = 'CARREGANDO...';
        btn.disabled = true;

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, senha })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('usuarioLogado', JSON.stringify(data.usuario));
                localStorage.setItem('perfilLogado', data.perfil);
                window.location.href = data.redirecionar;
            } else {
                alert(data.erro || 'Erro ao realizar login.');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        } catch (error) {
            console.error('Erro ao fazer login:', error);
            alert('Ocorreu um erro ao conectar ao servidor.');
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
