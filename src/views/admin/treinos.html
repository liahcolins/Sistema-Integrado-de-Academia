<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Treinos - FitCore</title>

    <link
        rel="stylesheet"
        href="/bootstrap/css/bootstrap.min.css"
    >

    <link
        rel="stylesheet"
        href="/css/style.css"
    >
</head>

<body>

    <div class="dashboard-container">

        <aside class="sidebar">

            <h2 class="logo">
                FIT<span>CORE</span>
            </h2>

            <nav>
                <ul>
                    <li>
                        <a href="/">
                            Dashboard
                        </a>
                    </li>

                    <li>
                        <a href="/admin/clientes">
                            Clientes
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Personais
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Exercícios
                        </a>
                    </li>

                    <li>
                        <a
                            href="/admin/treinos"
                            class="active"
                        >
                            Treinos
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Matrículas
                        </a>
                    </li>
                </ul>
            </nav>

        </aside>

        <main class="content">

            <div class="page-header">

                <h1>
                    Treinos
                </h1>

                <button
                    class="btn btn-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#modalTreino"
                >
                    + Novo Treino
                </button>

            </div>

            <div class="table-container">

                <table class="table table-dark table-hover align-middle">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Cliente</th>
                            <th>Personal</th>
                            <th>Data</th>
                            <th>Observações</th>
                        </tr>
                    </thead>

                    <tbody id="treinosTable">
                    </tbody>

                </table>

            </div>

        </main>

    </div>

    <div
        class="modal fade"
        id="modalTreino"
        tabindex="-1"
    >

        <div class="modal-dialog">

            <div class="modal-content bg-dark text-light">

                <div class="modal-header">

                    <h5>
                        Cadastrar Treino
                    </h5>

                    <button
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal"
                    ></button>

                </div>

                <div class="modal-body">

                    <form id="treinoForm">

                        <input
                            type="text"
                            id="nome"
                            class="form-control mb-3"
                            placeholder="Nome do treino"
                            required
                        >

                        <input
                            type="date"
                            id="data_criacao"
                            class="form-control mb-3"
                            required
                        >

                        <textarea
                            id="observacoes"
                            class="form-control mb-3"
                            placeholder="Observações"
                        ></textarea>

                        <input
                            type="number"
                            id="cliente_id"
                            class="form-control mb-3"
                            placeholder="ID do cliente"
                            required
                        >

                        <input
                            type="number"
                            id="personal_id"
                            class="form-control mb-3"
                            placeholder="ID do personal"
                            required
                        >

                        <button
                            class="btn btn-danger w-100"
                            type="submit"
                        >
                            Salvar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/treinos.js"></script>

</body>
</html>
