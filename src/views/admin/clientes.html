<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Clientes - FitCore</title>

    <link
        rel="stylesheet"
        href="/bootstrap/css/bootstrap.min.css"
    >

    <link
        rel="stylesheet"
        href="/css/style.css"
    >

</head>

<body>

    <div class="dashboard-container">

        <aside class="sidebar">

            <h2 class="logo">
                FIT<span>CORE</span>
            </h2>

            <nav>
                <ul>

                    <li>
                        <a href="/">
                            Dashboard
                        </a>
                    </li>

                    <li>
                        <a
                            href="/admin/clientes"
                            class="active"
                        >
                            Clientes
                        </a>
                    </li>

                    <li>
                        <a href="/admin/personais">
                            Personais
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Exercícios
                        </a>
                    </li>

                    <li>
                        <a href="/admin/treinos">
                            Treinos
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Matrículas
                        </a>
                    </li>

                </ul>
            </nav>

        </aside>

        <main class="content">

            <div class="page-header">

                <h1>
                    Clientes
                </h1>

                <button
                    class="btn btn-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#modalCliente"
                >
                    + Novo Cliente
                </button>

            </div>

            <div class="table-container">

                <table
                    class="table table-dark table-hover align-middle"
                >

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody id="clientesTable">

                    </tbody>

                </table>

            </div>

        </main>

    </div>

    <div
        class="modal fade"
        id="modalCliente"
        tabindex="-1"
    >

        <div class="modal-dialog">

            <div class="modal-content bg-dark text-light">

                <div class="modal-header">

                    <h5>
                        Cadastrar Cliente
                    </h5>

                    <button
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal"
                    ></button>

                </div>

                <div class="modal-body">

                    <form id="clienteForm">

                        <input
                            type="text"
                            id="nome"
                            class="form-control mb-3"
                            placeholder="Nome"
                            required
                        >

                        <input
                            type="email"
                            id="email"
                            class="form-control mb-3"
                            placeholder="Email"
                            required
                        >

                        <input
                            type="password"
                            id="senha"
                            class="form-control mb-3"
                            placeholder="Senha"
                            required
                        >

                        <select
                            id="status_matricula"
                            class="form-control mb-3"
                            required
                        >
                            <option value="">
                                Status da matrícula
                            </option>

                            <option value="Ativa">
                                Ativa
                            </option>

                            <option value="Inativa">
                                Inativa
                            </option>

                            <option value="Pendente">
                                Pendente
                            </option>

                        </select>

                        <button
                            class="btn btn-danger w-100"
                            type="submit"
                        >
                            Salvar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/clientes.js"></script>

</body>
</html>
