<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - FitCore</title>
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <link rel="stylesheet" href="/css/cadastro.css">
</head>
<body>

<div class="register-container">

    <div class="register-left">

        <div class="overlay"></div>

        <div class="left-content">
            <h1>FIT<span>CORE</span></h1>

            <h2>
                SEU TREINO<br>
                COMEÇA HOJE
            </h2>

            <p>
                Cadastre-se e tenha acesso
                à plataforma completa.
            </p>
        </div>

    </div>

    <div class="register-right">

        <div class="register-card">

            <h2>CRIAR CONTA</h2>

            <form id="registerForm">

                <input type="text" id="nome" placeholder="Nome Completo" required>

                <input type="email" id="email" placeholder="Email" required>

                <input type="password" id="senha" placeholder="Senha" required>

                <input type="password" id="confirmar-senha" placeholder="Confirmar Senha" required>

                <button type="submit">
                    CADASTRAR
                </button>

            </form>

            <p class="login-link">
                Já possui conta?
                <a href="/login">Entrar</a>
            </p>

        </div>

    </div>

</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;
        const confirmarSenha = document.getElementById('confirmar-senha').value;
        
        if (senha !== confirmarSenha) {
            alert('A senha e a confirmação de senha não coincidem!');
            return;
        }
        
        try {
            const response = await fetch('/usuarios', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nome,
                    email,
                    senha
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                const card = document.querySelector('.register-card');
                card.innerHTML = `
                    <div style="text-align: center; color: white;">
                        <span class="material-symbols-outlined" style="font-size: 64px; color: #dc2626; margin-bottom: 20px; display: inline-block;">check_circle</span>
                        <h2 style="font-size: 32px; margin-bottom: 15px; font-family: 'Oswald', sans-serif;">CADASTRO REALIZADO!</h2>
                        <p style="color: #ccc; font-size: 18px; line-height: 1.6;">Sua conta foi criada com sucesso. Você será redirecionado para a tela de login...</p>
                    </div>
                `;
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2500);
            } else {
                alert(data.erro || 'Erro ao realizar cadastro.');
            }
        } catch (error) {
            console.error('Erro:', error);
            alert('Ocorreu um erro de rede. Tente novamente mais tarde.');
        }
    });
</script>

</body>
</html>
